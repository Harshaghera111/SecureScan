version: "3.9"

services:
  # ── PostgreSQL Database ──
  db:
    image: postgres:16-alpine
    container_name: securescan-db
    environment:
      POSTGRES_DB: securescan
      POSTGRES_USER: securescan
      POSTGRES_PASSWORD: securescan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U securescan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Cache + Message Broker) ──
  redis:
    image: redis:7-alpine
    container_name: securescan-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ──
  backend:
    build: ./backend
    container_name: securescan-api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://securescan:securescan@db:5432/securescan
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker (Async Scans) ──
  worker:
    build: ./backend
    container_name: securescan-worker
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://securescan:securescan@db:5432/securescan
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: celery -A app.workers.celery_app worker --loglevel=info

volumes:
  pgdata:
  uploads:
